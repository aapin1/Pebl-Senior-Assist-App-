name: senior_assist
description: A Flutter app designed to assist seniors with accessibility-friendly features.

# The following line prevents the package from being accidentally published to
# pub.dev using `flutter pub publish`. This is preferred for private packages.
publish_to: 'none' # Remove this line if you wish to publish to pub.dev

version: 1.0.1+3

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.2
  speech_to_text: ^6.6.2
  permission_handler: ^12.0.1
  http: ^1.1.0
  flutter_tts: ^4.2.3
  flutter_dotenv: ^6.0.0
  shared_preferences: ^2.2.2
  google_mobile_ads: ^5.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true
  assets:
    - .env

# Configuration for flutter_launcher_icons
# Uses a 1024x1024 PNG (no transparency) to generate all required iOS app icon sizes,
# including the 1024x1024 iOS Marketing icon used on the App Store product page.
flutter_launcher_icons:
  ios: true
  image_path_ios: assets/icons/app_icon_1024.png
  remove_alpha_ios: true
